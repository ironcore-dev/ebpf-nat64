name: Build and Publish Docker Tester Image

env:
  platforms: linux/amd64

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'vmlinux/**'
      - 'bpftools/**'
      - 'libbpf/**'

jobs:
  buildAndPushTester:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.ref || github.event_name == 'push' && github.ref || github.event_name == 'pull_request' && github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Determine SHA for Docker Image
        id: get_sha
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "DOCKER_IMAGE_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          else
           echo "DOCKER_IMAGE_SHA=${{ github.sha }}" >> $GITHUB_ENV
          fi
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/ebpf-nat64-tester
          tags: |
            type=semver,pattern={{version}}
            type=schedule
            type=raw,${{ env.DOCKER_IMAGE_SHA }}
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
          flavor: |
            latest=${{ github.ref == 'refs/heads/main' }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{env.platforms}}
      - name: Set up Docker Buildx
        timeout-minutes: 5
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push tester
        timeout-minutes: 60
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{env.platforms}}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: tester
          secrets: |
            "github_token=${{ secrets.BOT_PAT }}"
  test:
    runs-on: ubuntu-latest
    needs: buildAndPushTester
    steps:
      - name: Determine SHA for Docker Image
        id: get_sha
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "DOCKER_IMAGE_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          else
            echo "DOCKER_IMAGE_SHA=${{ github.sha }}" >> $GITHUB_ENV
          fi
      # remove this when project is public
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # ebpf-nat64 tests
      - name: Run tests
        id: run_tests
        run: |
           docker run --rm --privileged ghcr.io/${{ github.repository_owner }}/ebpf-nat64-tester:${{ env.DOCKER_IMAGE_SHA }}
